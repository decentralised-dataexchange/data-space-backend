<div class="version-dropdown">
    {% for v in versions %}
    <div class="version-item">
        <span class="version-num">v{{ v.version }}</span>
        {% include "governance/partials/status_badge.html" with status=v.status %}
        <span style="color: var(--color-gray); font-size: 11px;">{{ v.updatedAt|date:"M d, Y" }}</span>
        {% if v.isLatestVersion %}<span style="color: var(--color-blue); font-size: 11px; font-weight: 500;">Latest</span>{% endif %}
    </div>
    {% empty %}
    <div class="version-item" style="color: var(--color-gray);">No other versions</div>
    {% endfor %}
</div>
