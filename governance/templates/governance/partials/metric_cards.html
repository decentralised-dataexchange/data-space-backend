<div class="metric-cards">
    <div class="metric-card">
        <div class="metric-label">Total DDAs</div>
        <div class="metric-value">{{ total }}</div>
    </div>
    <div class="metric-card">
        <div class="metric-label">Awaiting Approval</div>
        <div class="metric-value">{{ awaiting }}</div>
    </div>
    <div class="metric-card">
        <div class="metric-label">Listed</div>
        <div class="metric-value">{{ listed }}</div>
    </div>
    <div class="metric-card">
        <div class="metric-label">Rejected</div>
        <div class="metric-value">{{ rejected }}</div>
    </div>
</div>
