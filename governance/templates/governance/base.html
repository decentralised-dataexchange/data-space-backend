{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Governance{% endblock %} — CRANE d-HDSI Data Marketplace</title>
    <link rel="stylesheet" href="{% static 'governance/css/styles.css' %}">
</head>
<body>
    <header class="app-bar">
        <div class="app-bar-inner">
            <a href="{% url 'governance:dashboard' %}" class="app-bar-brand">
                <img class="app-bar-logo" src="{% static 'governance/img/logo.jpg' %}" alt="Logo">
                <div class="app-bar-text">
                    <span class="app-bar-title">CRANE d-HDSI Data Marketplace</span>
                    <span class="app-bar-subtitle">Sweden - Region Västerbotten</span>
                </div>
            </a>
            <div class="app-bar-right">
                <span class="app-bar-user">{{ request.user.email }}</span>
                <a href="{% url 'governance:logout' %}" class="app-bar-logout-btn">Sign Out</a>
            </div>
        </div>
    </header>
    <div class="layout">
        <aside class="sidebar">
            <ul class="sidebar-nav">
                <li>
                    <a href="{% url 'governance:dashboard' %}" class="active">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
                        DDA Governance
                    </a>
                </li>
            </ul>
        </aside>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="{% static 'unfold/js/htmx/htmx.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
